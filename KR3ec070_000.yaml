body:
  text: 正文風症諸暴強直支痛軟戾裡急筋縮皆屬於風真中風猝僵仆口噤不言不省人事如遺尿直視口開手撒汗出如珠屬不治證西北高寒之地有此東南無之忌破氣下吐苦寒酸斂諸藥俱錄後宜辛甘發散峻補真氣桂枝附子甘草獨活羌活天麻麻黃防風芎藭細辛藁本牛黃辛夷白芷蔓荊實牡荊實人參黃耆有痰加竹瀝南星半夏薑汁類中風口眼歪斜語言謇澀半身不遂口噤不言四肢不舉痰涎壅盛昏瞀不省人事忌汗吐下大忌破氣溫熱苦寒及一切治風濕辛燥發散並開竅走真氣行血諸藥慎勿犯之犯之則輕必重重必斃麝香蘇合香檀香龍腦香安息香余忌藥俱錄後宜滋補陽虛者補氣陰虛者補血陰陽兩虛則氣血雙補兼宜清熱降氣豁痰及保脾胃天門冬脾胃薄弱者勿多用麥門冬荊瀝蘇子栝蔞根枇杷葉貝母霞天膏橘紅甘草竹瀝童便梨汁黃柏次益血於前藥中加胡麻仁石斛生地黃牛膝薯蕷五味子甘菊花丹參枸杞子竹葉鱉甲菟絲子何首烏木瓜山茱萸芍藥遠志白蒺藜酸棗仁青蒿栝蔞仁沙參茯苓巴戟天柏子仁人參車前子茯神羚羊角如便閉加肉蓯蓉當歸倍麻仁兼氣虛加人參黃耆有肺熱者勿入人參感冒風寒俗名傷風其症或頭疼身熱輕者則兩鼻必塞兼流清涕必惡風寒或聲重或聲啞甚者痰壅氣喘咳嗽忌補氣酸斂閉氣諸藥錄後宜發散辛甘溫芎藭細辛藁本防風甘草荊芥白芷前胡桔梗紫蘇薄荷杏仁傷風熱忌同感冒風寒宜辛寒甘寒發散石膏知母甘草竹葉麥冬前胡桔梗薄荷葛根桑白久而不愈者屬虛陽虛者加人參黃耆陰虛者加五味地黃倍麥冬白芍寒症諸病上下所出水液澄澈清冷癥瘕㿗疝堅痞腹滿急痛下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒凡中寒必本於陽虛忌破氣苦寒下苦寒辛寒諸藥錄後宜補氣散寒辛甘溫熱輕者解表重者溫補桂枝乾薑麻黃人參附子黃耆傷寒冬月即病宜從仲景法暑症諸病喘嘔暴注下迫霍亂轉筋身熱瞀郁小便濁赤皆屬於暑忌破氣升復忌下濕潤辛溫辛燥熱散閉氣熱諸藥錄後宜清暑益氣健脾甘寒苦溫辛寒酸寒苦寒黃連香薷葛根石膏知母甘草人參黃耆白朮扁豆神麯橘皮茯苓木瓜麥門五味白芍白梅烏梅大約用清暑益氣湯香薷飲生脈散凡病暑之人其氣必虛暑傷氣無氣以動故當補氣為本惟肺熱多火者忌參術中暑猝昏暈急以童便入即省忌宜俱同暑又方用絲瓜葉一片白鹽梅肉一枚並取核中仁共研如泥新汲水調灌立瘥兼治中暑霍亂如神太陽病中暍忌同暑宜人參白虎湯有肺病不能服參者用竹葉石膏湯脾胃作瀉者水調六一散霍亂見胃虛條內忌宜俱同暑疰夏繇於脾胃薄弱胃家有濕熱及留飲所致忌同前宜益氣健脾酸寒苦寒淡滲人參半夏白朮橘皮茯苓扁豆白芍木瓜澤瀉兼服生脈散濕症諸痙強直積飲痞膈中滿霍亂吐下體重胕腫肉如泥按之不起皆屬於濕經云地之濕氣感則害人皮肉筋脈故其病筋骨疼痛腰重痛不可轉側身重四肢不利濕在上病嘔吐頭重胸滿濕在中腹脹中滿泄瀉濕在下足腔跗腫腳氣臁瘡久不愈忌濕潤甘咸諸藥錄後宜散滲泄燥辛苦木瓜薏苡蒼朮石斛萆薢石菖蒲茯苓佐以防風葛根寒濕加半夏五加皮風濕加獨活濕熱加黃柏車前子木通甚者漢防己腳氣繇於濕熱忌溫燥濕熱補氣復忌破氣升諸藥錄後宜清熱除濕利小便甘平酸寒苦寒辛溫淡滲黃柏石斛麥門冬木瓜茯苓石菖蒲木通澤瀉薏苡仁萆薢防己車前子燥症諸澀枯涸幹勁皴揭皆屬於燥角弓反張筋攣急不舒舌強不能言二便閉澀口渴口乾舌苦皮膚皴揭毛髮脆折津液不生血枯胃槁以致飲食不化噎膈吐食忌升散破氣下辛燥大熱溫藥錄後宜潤益血辛甘寒酸寒鹹寒有熱症者宜兼清熱當歸地黃麥門冬人乳牛乳肉蓯蓉酥蜜甘菊花胡桃麻仁柏子仁人參胡麻天門冬松實蔗漿五味子白芍棗仁蘆根汁梨汁韭汁童便佐以薑汁火症諸熱瞀瘈暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆上衝禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘈暴病暴死皆屬於火忌補斂升發閉氣辛燥溫熱諸藥錄後宜降折下鹹寒苦寒辛寒甘寒大黃童便芒硝黃芩黃連黃柏連翹石膏山梔玄參甘草知母天冬麥冬生地藍汁虛者宜甘寒鹹寒以滋水不宜用苦寒傷胃猝眩僕九竅流血多不治忌同火宜童便鹽湯竹瀝藍汁梨汁生犀角汁猝心痛忌同火宜山梔白芍藥玄胡索生甘草鹽湯蘇子目暴赤腫痛甚見肝實條內忌宜俱同二便忽閉以利小便為先忌同火宜降潤苦寒甘寒辛寒利竅大黃蘇子生蜜麻仁桃仁石膏知母天冬麥冬黃芩山梔滑石澤瀉豬苓車前木通頭面赤腫忌同火宜清熱解毒發散苦寒辛寒甘寒鹹寒甘菊花鼠黏子連翹荊芥薄荷蟬蛻大黃玄參石膏知母竹葉童便生甘草忽大渴思冰水忌同火宜潤生津液辛寒甘寒鹹寒石膏知母玄參麥冬竹葉栝蔞根梨汁蔗漿童便涼水冰五味子口乾舌苦忌宜俱同火暴喑忌同火宜降氣發音聲苦苦寒辛涼鹹寒蘇子枇杷葉貝母桔梗百部竹瀝梨汁天門冬甘草薄荷玄參童便麥冬桑白皮暴注忌同火宜利水苦寒酸寒茯苓黃連黃芩白芍藥生甘草葛根滑石木通虛者加人參白扁豆蓮肉躁擾狂越罵詈驚駭忌同火宜清鎮苦寒辛寒鹹寒丹砂牛黃黃連黃芩山梔滑石石膏知母童便大便閉者加大黃下之不行加芒硝禁慄如喪神守忌同火宜同躁擾狂越氣逆衝上忌同火宜降氣酸斂甘寒苦寒鹹寒蘇子枇杷葉橘紅五味子石斛番降香黃柏山茱萸牛膝白芍藥童便桑白皮麥冬瞤瘈瞀瘈忌同火宜清熱和肝酸寒苦寒辛寒甘寒白芍藥生甘草竹葉玄參黃連生地黃甘菊花麥門冬知母石膏以上忌宜為風寒暑濕燥火六淫外症下乃陰陽五臟六腑裡虛實內症之忌宜也陽虛即真氣虛其證惡寒或發熱自汗汗多亡陽陽虛不發熱單惡寒者居多忌破氣降泄利水苦寒又忌辛熱發散青皮枳殼厚朴牽牛檳榔以上破氣大黃石膏山梔知母天冬生地栝蔞以上降泄澤瀉木通瞿麥漢防己海金沙葶藶豬苓滑石以上利水黃芩黃連黃柏玄參槐花以上苦寒芍藥烏梅醋以上酸麻黃羌活獨活前胡防風荊芥吳茱萸以上辛熱發散宜補甘溫熱人參黃耆二術炙草當歸桂淫羊藿附子仙茅鹿茸羊肉補骨脂巴戟天陰虛即精血虛其證為咳嗽多痰吐血咯血嗽血鼻衄齒衄盜汗自汗發熱寒熱潮熱骨乏無力不眠氣急腰背痛忌補氣復忌破氣燥熱辛溫又忌大寒大苦傷胃並升提發散利水人參黃耆二術以上補氣南星半夏附子官桂桂枝仙茅鹿茸乾薑丁香胡椒烏頭火酒吳萸烏藥生薑以上燥熱辛溫山梔黃芩黃連大黃芒硝玄明粉以上大寒大苦傷胃麻黃升麻柴胡羌活獨活藁本川芎防風以上升提發熱破氣利水藥錄後宜生精補血兼清虛熱斂攝酸寒甘寒甘平鹹寒略兼苦寒地黃柏仁人乳沙苑蒺藜枸杞子牛膝麋角膠阿膠酸棗仁沙參石斛白芍藥山茱萸遠志地骨皮薯蕷續斷車前子五味子鱉甲麥門冬黃柏知母牡丹皮表虛其證自汗惡風灑淅寒喜就溫暖脈浮無力忌破氣升發辛熱麻黃升麻防風柴胡羌活獨活前胡乾葛紫蘇薄荷白芷生薑荊芥以上升發吳萸桂枝表虛而中寒者不忌乾薑以上辛熱破氣藥見後宜補斂益氣實表甘酸人參黃耆芍藥甘草桂枝有熱者勿用五味子裡虛其證洞泄或完穀不化心腹痛按之即止或腹脹或傷寒下後痞滿忌破氣下苦寒大黃芒硝玄明粉牽牛已上下黃芩黃連山梔天門冬防己知母上苦寒破氣藥錄後宜溫補甘佐以辛熱人參術炙甘草大棗糯米肉桂附子有熱者勿用乾薑陽實即表邪熱盛其證頭痛寒熱遍身骨痛無力忌補斂下大熱黃耆人參二術桂枝芍藥五味醋米麵食豬羊犬以上補斂附子胡椒乾薑肉桂蒜吳茱萸以上大熱下藥錄後宜辛寒發散天寒略加辛熱辛溫佐之石膏知母葛根麥冬前胡柴胡黃芩紫蘇薄荷升麻防風蔥白荊芥羌活麻黃冬月可用春夏忌之陰實即裡實外感證屬邪熱內結者其證胸腹硬痛手不可近大便七八日不行或挾熱下痢忌辛溫發散補斂藥見上宜下苦寒鹹寒甘辛大黃厚朴枳實滑石山梔黃芩黃連藍茵陳芒硝桃仁陽厥即熱厥其證四肢厥逆身熱面赤唇燥大渴口乾舌苦目閉或不閉小便赤澀短少大便燥結不省人事忌升發補斂燥熱辛溫諸藥俱錄後宜下清熱甘寒苦寒鹹寒大黃芒硝石膏黃芩黃連山梔知母童便如挾虛有痰者宜麥門冬竹瀝蘆根汁梨汁牛黃童便如婦人熱入血室因而厥者藥中以童便為君加赤芍藥生地黃牛膝牡丹皮桃仁甚者大便結燥加大黃芒硝下之通即止勿盡劑陰厥即寒厥其證四肢厥逆身冷麵青蜷臥手指爪青黯腹痛大便溏或完穀不化小便自利不渴不省人事忌下破氣苦寒鹹寒酸寒食鹽童便以上鹹寒芍藥醋以上酸寒下破氣苦寒藥錄後宜補氣溫中甘溫辛熱人參乾薑附子桂吳茱萸上盛下虛屬陽盛陰虛忌升散下助陽補氣復忌破氣燥熱辛宜降益陰甘寒酸寒佐以鹹寒苦寒蘇子生地沙參牛膝枇杷葉枸杞子麥冬天冬白芍玄參山茱萸五味子黃柏童便心虛八證忌升發破氣苦寒辛燥大熱諸藥錄後宜補血甘溫酸斂佐以鹹寒鎮墜生地黃龍眼肉人參石斛丹參茯神炙甘草酸棗仁五味柏仁遠志炒鹽癲癇驚邪屬心氣虛兼有熱痰忌同上宜清熱豁痰合心虛加麥門冬犀角羚羊角竹瀝天竺黃牛黃膽星貝母琥珀金箔心煩不得眠屬心血虛有熱忌同上宜養陰血清熱加白芍藥玄參黃連淡竹葉沙參怔忡心澹澹動盜汗屬心血虛汗者心之液也忌同上宜補斂清熱合心虛加當歸黃耆芍藥黃芩黃柏伏梁屬心經氣血虛以致邪留不去忌破血汗下三稜蓬莪薑黃虻蟲紅藍花水蛭桃仁以上破血諸藥錄後宜活血涼血散熱通結辛鹹當歸乳香五靈脂沒藥赤芍藥鬱金遠志菖蒲玄胡索茯神參用東垣伏梁丸治之肝虛十證忌收斂破氣苦寒下諸藥錄後宜辛散甘緩當歸陳皮生薑地黃甘菊甘草胡麻穀精草決明子刺蒺藜因鬱而虛者加細辛縮砂密沉水香川芎香附轉筋屬血虛忌下復忌升燥熱閉氣苦寒破氣二術黃耆銀杏豬脂羊肉面以上閉氣宜酸辛甘平木瓜牛膝當歸身石斛續斷陳皮芍藥炙草縮砂密目昏目光短屬肝血虛及腎水真陰不足忌破氣升燥熱諸藥錄後宜補肝兼滋腎甘溫益血甘寒除熱甘枸杞生地黃甘菊花沙苑蒺藜穀精草五味子決明子天門冬麥門冬目翳屬肝熱兼腎水不足忌破氣升燥熱苦寒諸藥錄後宜補肝血除熱退翳甘菊花生地黃決明子石決明沙苑蒺藜羚羊角犀角黃連伏翼糞木賊穀精草密蒙花人爪蟬蛻石蟹真珠琥珀亡血過多角弓反張或小腹連陰作痛屬肝血虛有熱忌同肝血虛宜補血清熱甘寒甘溫酸寒鹹寒辛潤當歸生地黃白芍藥炙草牛膝麥冬童便牡丹皮甘菊花有汗加人參黃耆棗仁五味子偏頭痛屬血虛肝家有熱不急治久之必損目忌同目昏宜養血清虛熱甘寒酸寒辛寒生地黃天門冬甘菊花白芍藥當歸川芍烏梅炙甘草土茯苓金銀藤黑豆有火實者加黃連酒炒大黃酒蒸芎藭石膏雨前茶目黑暗眩暈屬血虛兼腎水真陰不足忌同上宜養血補肝清熱甘寒甘平酸寒苦寒生地黃枸杞子甘菊花五味子白蒺藜當歸薯蕷甘草山茱萸白芍藥天門冬黃柏肥氣屬氣血兩虛肝氣不和逆氣與瘀血相併而成忌同上苦寒宜和肝散結氣兼行氣血凝滯甘溫甘平川芎當歸沉香乾薑肉桂橘皮紅花鬱金玄胡索赤芍藥香附山楂紅曲砂仁參用東垣肥氣丸治之脾虛十二證