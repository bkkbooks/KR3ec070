山楂紅曲白多加吳茱萸七分噁心欲嘔即噤口痢多用人參蓮肉扁豆白芍以綠色升麻七分佐之久痢不止加肉豆蔻一錢人參三錢砂仁一錢五分白茯苓二錢泄瀉忌濕潤破氣下苦寒滑利宜安胃補脾升利小便人參茯苓蓮肉白朮升麻車前子橘紅藿香木瓜乾葛炙草白萊菔扁豆虛寒者加肉豆茯苓補骨脂吳茱萸虛熱者去白朮加川黃連倍芍藥蓮肉暑濕為病則小水短赤或口渴倍用薑黃連為君佐以乾葛升麻繇於感風寒者二朮吳茱萸砂仁陳皮乾薑紫蘇主之若繇飲食停滯者兼消導山楂麥芽神麯陳皮肉豆蔻諸疸忌破氣閉氣下咸滑利滯膩潤燥熱有瘀血者兼忌酸寒宜清熱利水除濕養胃氣有停滯者宜消積滯有瘀血者宜行血茵陳蒿黃連苜蓿酒疸非此不愈梔子紫草滑石栝蔞根秦艽車前子白鮮皮黃芩茯苓仙人對坐草連錢草一名蟹靨草一名九里香取汁入薑汁少許飲之良虛者加人參停滯者加紅曲橘谷麥柏山楂瘀血加琥珀牡丹皮紅曲紅花桃仁玄胡索蒲黃五靈脂韭元氣壯實者服前藥瘀血不行可加熟地黃虛勿用痰繇於熱忌燥溫熱補斂升諸藥錄後宜降潤清熱苦寒辛寒佐以鹹寒蘇子橘紅黃芩薄荷枇杷葉桑白皮百部桔梗貝母蛤粉栝蔞根栝蔞仁天冬麥冬竹瀝童便膠固者加霞天膏痰繇於風寒忌補斂酸咸濕潤諸藥錄後宜降氣辛散橘紅蘇子杏仁天麻前胡桑白皮半夏南星葛根薄荷白前生薑汁痰繇於濕忌潤咸酸滯膩發散諸藥錄後宜健脾燥濕辛散佐以淡滲人參二術橘紅半夏茯苓桑白皮澤瀉飲如涎而薄者或如涎而稠者伏於胸中及脾胃間或吐酸水苦水黃水綠水或伏而不吐上支心胸胃脘作痛不可忍按之不得下或發寒熱嘔吐不得飲食忌宜俱同脾虛證內停飲條諸氣氣有餘即是火忌升閉氣酸斂滯膩虛者宜降補斂調溫酸辛甘枇杷葉蘇子橘紅甘蔗麥門冬蘆根汁沉水香白豆蔻鬱金甘草童便番降香五味子芍藥因虛極而氣不得行者加人參實者宜破散香燥辛苦辛寒枳殼青皮檳榔厚朴木香縮砂密沉香香附烏藥降香藿香諸郁忌酸斂滯膩補氣閉氣諸藥錄後屬情抱者宜開發志意調散結和中健脾遠志貝母鬱金香附石菖蒲白豆蔻蘇子橘紅木香麥冬蘇合香縮砂密屬五臟者木鬱達之宜升吐升麻柴胡川芎瓜蒂人參蘆火鬱發之宜散升麻葛根柴胡防風羌活土鬱奪之宜下檳榔枳實厚朴大黃金鬱泄之宜降桑白皮赤小豆橘紅蘇子豬苓澤瀉車前子鳥喙魚木通關格忌升補斂閉氣酸諸藥錄後宜降下辛寒辛溫白豆蔻沉香丁香蘇子橘紅龍腦草蘇合香生薑藿香次用大黃車前子黃柏知母滑石木香牛膝噦症俗呼呃逆忌破氣升散宜補斂甘溫甘寒炙甘草麥門冬人參黃耆石斛五味子益智子白芍藥傷寒失下而發者忌補斂酸燥熱滯膩諸藥錄後宜下大小承氣之類便不硬閉按之腹中和軟未經汗吐者宜辛寒解表白虎湯之類氣逆衝上而發者忌升補諸藥錄後宜降氣甘寒鹹寒枇杷葉蘆根汁麥門冬蘇子橘紅竹茹童便因痰水停膈而發者忌升潤苦寒甘寒酸寒諸藥錄後宜降氣開痰辛散桑白皮蘇子貝母橘紅半夏旋覆花白豆蔻生薑吐血咯血鼻衄齒衄耳衄舌上出血忌升提發散下破血補氣閉氣破氣溫熱辛燥復忌極苦寒傷胃諸藥錄後宜降氣清熱涼血益陰兼行血鹹寒酸寒甘寒蘇子天冬麥冬橘皮枇杷葉生地黃降香鬱金沙參牛膝熟地黃枸杞子五味阿膠鱉甲青蒿牡丹皮犀角屑芍藥剪草童便茅根白藥子側柏葉稷灰藕節當歸蒲黃小薊蓄血發熱積瘀不行忌破氣復忌補氣下苦寒辛燥諸藥錄後辛行血辛溫佐以鹹寒瘀血行後宜補血益脾和肝紅藍花桃花鬱金乳香玄胡索桂有火勿用當歸尾沒藥䗪蟲蒲黃蘇方木番降香穿山甲紅曲韭汁童便五靈脂麒麟竭赤芍藥桃梟甚者用大黃花蕊石瘀行則止勿過劑如元氣虛脾胃素弱者慎勿輕用大黃如瘀血行後宜生地黃川續斷當歸身牛膝大黃芍藥酸棗仁龍眼肉枸杞子石棗炙草頭痛挾風寒者忌補斂諸藥錄後宜辛溫發散羌活防風細辛蔓荊子荊芥薄荷川芎藁本升麻白芷生薑蔥白頭痛挾邪熱者忌同挾風寒宜辛寒苦寒解散石膏薄荷芽茶黑豆甘菊花土茯苓烏梅黃芩酒炒熱極目昏便燥者加酒蒸大黃頭痛挾痰者忌升補斂酸甘滯膩諸藥錄後宜豁痰降氣辛燥蘇子橘紅術貝母半夏前胡竹瀝天麻頭痛陰虛者忌辛熱發散諸藥錄後宜補血益陰甘寒酸寒生地黃甘菊花當歸黃柏天門冬麥門冬枸杞子忍冬烏梅白芍五味子眉稜骨痛忌宜俱同陰虛齒痛忌升補斂燥熱辛溫諸藥錄後宜清熱涼血苦寒甘寒辛寒鹹寒竹葉知母黃連黃芩麥門冬生地黃黃柏玄參石膏薄荷赤芍藥牡丹皮蘇子甘草童便上下齦屬胃與大腸火宜熟地黃石膏黃芩黃連麥門冬赤芍藥青黛細辛甘草薄荷生地黃枇杷葉蘇子木通西瓜皮灰真牙浮動及黑爛屬腎虛有火已見腎虛條內忌宜俱同胃脘痛因火者忌補斂燥熱諸藥錄後宜降苦寒甘寒鹹寒辛寒蘇子橘紅黃連山梔麥門冬炙甘草石膏知母玄參童便因寒者忌破氣滯膩苦寒諸藥錄後宜辛溫發散草豆蔻橘紅益智丁香桂白朮白蔻吳萸厚朴香附乾薑縮砂密藿香因宿食者忌升補斂苦寒諸藥錄後宜消導兼降氣因脾胃虛弱食停者消導加人參山楂草果紅曲草豆蔻穀麥糵枳實檳榔青皮厚朴術縮砂密橘皮因瘀血者忌補氣酸斂諸藥錄後宜辛溫苦溫以行血桃仁紅曲紅花韭菜玄胡索山楂肉鬱金肉桂三稜童便牡丹皮赤芍藥通草牛膝琥珀因血虛者按之則痛止忌破氣復忌補氣燥熱辛溫宜潤補斂甘寒甘溫石斛麥門冬炙甘草酸棗仁白芍藥當歸生地黃因蟲者忌補升發散甘諸藥錄後宜殺蟲苦酸苦楝根使君子薏苡仁根錫灰檳榔鶴蝨雷丸蕪荑大黃烏梅因惱怒者虛弱人忌破氣壯實人忌補氣總忌酸斂升諸藥錄後宜降氣辛溫枇杷葉白豆蔻番降香蘇子木香橘紅縮砂密玄胡索五靈脂因痰飲者忌宜俱見痰飲證下腹痛因於寒忌苦寒下利諸藥錄後宜溫中辛散白朮厚朴吳茱萸縮砂密乾薑桂木香橘皮炙甘草因於熱火在少腹則絞痛忌辛散香燥補斂諸藥錄後宜甘苦寒山梔仁麥門冬石斛白芍藥甘草桔梗黃芩黃連滑石木通戎鹽諸痛不可按屬實忌補氣大熱諸藥錄後宜破散疏利苦寒枳實青皮蓬莪檳榔三稜滑石木通大黃有積滯宜用無者勿用諸痛可按屬虛忌破氣破血下利發散諸藥錄後宜補氣血甘溫酸斂人參黃耆生地黃二術當歸炙草白芍薯蕷棗仁五味痹拘攣而痛也因風寒濕三者合而成風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹忌下收斂酸寒苦寒鹹寒諸藥錄後宜辛散行氣燥濕甘寒淡滲漆葉續斷黃耆萆薢甘菊花車前子甘草防己白朮防風桑寄生蔓荊實羌活獨活牛膝秦艽白蘚皮原蠶沙木瓜天麻澤瀉茯苓威靈仙海風藤菖蒲狗脊杜仲石斛細辛松節松葉痿屬濕熱經曰治痿獨取陽明忌破氣升辛熱發散宜大補氣血清熱除濕甘寒甘溫苦寒酸寒人參黃耆二術麥冬炙甘草生地黃木瓜石斛薏苡黃柏白芍藥車前子茯苓木通黃芩川黃連交腸其病大小便易位而出或因大怒或因醉飽遂至臟氣乖亂不循常道法當宣吐以開提其氣使闌門清利得司秘別職則愈矣忌破氣燥熱諸藥錄後宜升清降濁兼補氣淡滲升麻柴胡蘇子降香橘紅人參術茯苓澤瀉豬苓木通滑石車前子鬼疰屍疰飛屍客忤此係天地陰邪殺厲之氣乘虛中人或遍身青黯或忽消瘦聲啞面色青黃不定或忽驚厥目直視手握拳或遍身骨節疼痛非常忌破氣復忌補氣升燥熱酸斂諸藥錄後宜辟惡氣安神鎮心辛香發散金石鎮墜牛黃丹砂琥珀乳香蘇合香天竺黃檀香木香麝香沉香龍腦香安息香真珠雄黃犀角金銀箔代赭石虎骨獺肝遠志生地黃龍齒天靈蓋菖蒲諸病應忌藥總例補氣人參黃耆二術人胞紅鉛溫補人胞紅鉛白膠鹿茸人參巴戟天黃耆白朮淫羊藿肉蓯蓉補骨脂當歸狗陰莖菟絲子蛇床子大熱附子肉佳仙茅烏頭陽起石海狗腎硫黃羊肉雀肉天雄葫蘆巴破氣青皮枳實枳殼檳榔厚朴牽牛閉氣銀杏二術黃耆米曲食豬脂油降氣蘇子鬱金橘紅沉香枇杷葉降真香烏藥破血桃仁紅花乾漆乳香蘇方木玄胡索沒藥薑黃三稜蓬莪五靈脂花蕊石水蛙虻蟲肉桂穿山甲麒麟竭䗪蟲升提發散升麻柴胡川芎紫蘇麻黃乾葛羌活獨活防風白芷生薑細辛荊芥前胡藁本蔥白薄荷辛溫辛熱發散乾薑桂枝麻黃吳萸細辛羌活獨活防風藁本川芎白芷蔥白吐瓜蒂梔子豉人參蘆皂莢藜蘆常山蝦汁鹽湯下大黃芒硝巴豆牽牛枳實玄明粉厚朴降泄山梔知母玄參天冬利水豬苓澤瀉木通瞿麥葶藶海金沙滑石商陸茯苓萹蓄琥珀烏桕根皮芫花甘遂大戟車前續隨子漢防己郁李仁損津液郁李仁白礬紅礬半夏斂攝白芍五味醋烏梅白梅酸棗仁固澀龍骨牡蠣粟殼益智山茱萸桑螵峭肉果蛇床子阿芙蓉金櫻子原蠶娥蓮須訶黎勒消導山楂麥芽草果檳榔三稜蓬莪神麯枳殼枳實綠礬紅曲橘紅萊菔子砂仁開竅麝香檀香龍腦香蘇合香安息香香燥沉香麝香豆蔻龍腦香縮砂密藿香香附丁香烏藥木香辛燥火酒蒜半夏南星二術辛熱乾薑胡椒巴豆吳萸茴香龍腦香濕潤地黃當歸天冬知母肉蓯蓉栝蔞仁豬脂麻仁滯膩豬羊犬鵝肉地黃南面油膩炙爆滑利榆皮牛乳柿瓜李冬葵子桃梨蜜青菜蓴菜酥椿根白皮茄子發濕鱖魚南面苦寒傷胃山梔黃柏黃芩黃連大黃苦參玄參知母蘆薈補命門相火鹿茸附子紅鉛巴戟天陽起石白膠人胞肉桂仙茅淫羊藿膃肭臍補骨脂狗陰莖菟絲子原蠶蛾補腎水苦寒黃柏玄參知母天門冬酸寒牛膝烏梅芍藥鹹寒童便芒硝玄參秋石生冷菱梨菜李甘甘草飴糖大棗蜜咸食鹽商陸鹼水鹿茸蛤蜊蟶蠣黃
